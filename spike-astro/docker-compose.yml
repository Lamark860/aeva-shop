services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    container_name: ceramic-astro-pb
    environment:
      PB_ADMIN_EMAIL: admin@ceramic.local
      PB_ADMIN_PASS: ceramic123
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  astro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ceramic-astro-web
    environment:
      PB_URL: http://pocketbase:8090
    ports:
      - "4321:4321"
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  pb_data:
