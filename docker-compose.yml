services:
  # one-shot: накатывает миграции Payload до старта app, затем выходит
  migrate:
    build:
      context: .
      target: builder
    command: npx payload migrate
    restart: "no"
    environment:
      DATABASE_URI: postgres://ceramic:${DB_PASSWORD}@postgres:5432/ceramic
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    container_name: ceramic-app
    restart: unless-stopped
    environment:
      DATABASE_URI: postgres://ceramic:${DB_PASSWORD}@postgres:5432/ceramic
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: https://${DOMAIN}
      NODE_ENV: production
      MEDIA_DIR: /app/media
      DOMAIN: ${DOMAIN}
      # Уведомления о заявках (пустые → канал пропускается)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ORDER_EMAIL_TO: ${ORDER_EMAIL_TO:-}
    volumes:
      - ./uploads:/app/media
    networks:
      - internal
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.ceramic.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.ceramic.entrypoints=websecure"
      - "traefik.http.routers.ceramic.tls=true"
      - "traefik.http.routers.ceramic.tls.certresolver=letsencrypt"
      - "traefik.http.services.ceramic.loadbalancer.server.port=3000"
      # редирект http → https (если ещё не настроен глобально в traefik)
      - "traefik.http.routers.ceramic-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.ceramic-http.entrypoints=web"
      - "traefik.http.routers.ceramic-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"

  postgres:
    image: postgres:16-alpine
    container_name: ceramic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ceramic
      POSTGRES_USER: ceramic
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceramic"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # никаких ports наружу — только во внутреннюю сеть

networks:
  internal:
  proxy:
    external: true

volumes:
  postgres-data:
