services:
  postgres:
    image: postgres:16-alpine
    container_name: ceramic-next-pg
    environment:
      POSTGRES_USER: ceramic
      POSTGRES_PASSWORD: ceramic_secret
      POSTGRES_DB: ceramic
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceramic"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ceramic-next-web
    environment:
      DATABASE_URI: postgres://ceramic:ceramic_secret@postgres:5432/ceramic
      PAYLOAD_SECRET: ceramic-spike-secret-change-me
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
