<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Керамика — макеты к обсуждению</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="ceramic.css" />
    <style>
      html, body { margin: 0; padding: 0; }
      body { font-family: 'Inter', system-ui, sans-serif; }
      /* Внутри артбордов 100vh нам не нужен — артборды фиксированного размера. */
      .cer-page .cer-hero { height: 100% !important; }
      /* Артборды не должны прокручиваться сами по себе — макеты статичные. */
    </style>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="artboards/_shared.jsx"></script>
    <script type="text/babel" src="artboards/heroes.jsx"></script>
    <script type="text/babel" src="artboards/about.jsx"></script>
    <script type="text/babel" src="artboards/projects.jsx"></script>
    <script type="text/babel" src="artboards/horeca.jsx"></script>
    <script type="text/babel" src="artboards/utility.jsx"></script>

    <script type="text/babel">
      function App() {
        return (
          <DesignCanvas>
            <DCSection
              id="hero"
              title="Hero — варианты"
              subtitle="Подзаголовок, копирайт кнопок, разветвление аудиторий"
            >
              <DCArtboard id="hero-v1" label="V1 · Контроль (как сейчас)" width={1280} height={720}>
                <HeroV1Control />
              </DCArtboard>
              <DCArtboard
                id="hero-v2"
                label="V2 · Подзаголовок + спокойный CTA"
                width={1280}
                height={720}
              >
                <HeroV2Subtitle />
              </DCArtboard>
              <DCArtboard
                id="hero-v3"
                label="V3 · Hero + полоса разветвления (Каталог / На заказ / Ресторанам)"
                width={1280}
                height={920}
              >
                <HeroV3Routing />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="about"
              title="О мастере"
              subtitle="Личная страница автора, длинная и спокойная"
            >
              <DCArtboard id="about-page" label="Полная страница" width={1280} height={2860}>
                <About />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="projects"
              title="Проекты"
              subtitle="Case study вместо обычной галереи: серии, для интерьеров, для ресторанов"
            >
              <DCArtboard id="projects-list" label="Список проектов" width={1280} height={2200}>
                <ProjectsList />
              </DCArtboard>
              <DCArtboard
                id="project-detail"
                label="Один проект — case study (Norra)"
                width={1280}
                height={3100}
              >
                <ProjectDetail />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="horeca"
              title="Для ресторанов"
              subtitle="Отдельная B2B-страница: кейсы, сотрудничества, процесс, форма для шефа"
            >
              <DCArtboard id="horeca-page" label="Полная страница HoReCa" width={1280} height={3000}>
                <Horeca />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="utility"
              title="Утилитарные страницы и детали"
              subtitle="Уход, дневник, кликабельный процесс, новый футер, ориентировочная цена"
            >
              <DCArtboard id="care" label="Уход за керамикой" width={1280} height={1380}>
                <Care />
              </DCArtboard>
              <DCArtboard
                id="journal"
                label="Дневник мастерской (форма подписки + пример письма)"
                width={1280}
                height={1640}
              >
                <Journal />
              </DCArtboard>
              <DCArtboard
                id="process-click"
                label="Кликабельный шаг процесса (раскрытое состояние)"
                width={1280}
                height={780}
              >
                <ProcessClickable />
              </DCArtboard>
              <DCArtboard
                id="footer-routing"
                label="Footer с разветвлением аудиторий"
                width={1280}
                height={460}
              >
                <FooterRouting />
              </DCArtboard>
              <DCArtboard
                id="product-card-indic"
                label="Карточка товара: цена как ориентир"
                width={1100}
                height={780}
              >
                <ProductCardIndicative />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
