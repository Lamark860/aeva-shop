<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Керамика — живой прототип</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="ceramic.css" />
    <link rel="stylesheet" href="prototype/styles.css" />
    <style>
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        padding: 0;
        background: var(--cer-bg);
        font-family: var(--cer-font-body);
        color: var(--cer-text);
      }
      /* В прототипе 100vh у hero оставляем — это нормальная страница */
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="prototype/anim.jsx"></script>
    <script type="text/babel" src="prototype/data.jsx"></script>
    <script type="text/babel" src="prototype/ui.jsx"></script>
    <script type="text/babel" src="prototype/app.jsx"></script>

    <script type="text/babel" src="prototype/home.jsx"></script>
    <script type="text/babel" src="prototype/catalog.jsx"></script>
    <script type="text/babel" src="prototype/product.jsx"></script>
    <script type="text/babel" src="prototype/gallery.jsx"></script>
    <script type="text/babel" src="prototype/projects.jsx"></script>
    <script type="text/babel" src="prototype/horeca.jsx"></script>
    <script type="text/babel" src="prototype/about.jsx"></script>
    <script type="text/babel" src="prototype/misc.jsx"></script>

    <script type="text/babel">
      // Стартовый hash, если пусто
      if (!window.location.hash) window.location.hash = '#/home';

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(
        <React.Fragment>
          <CursorFollower />
          <App />
        </React.Fragment>
      );
    </script>
  </body>
</html>
